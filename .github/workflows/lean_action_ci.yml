name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Only keep the latest run per branch/PR going.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # lean-action installs the toolchain pinned in `lean-toolchain`, fetches the prebuilt Mathlib
      # olean cache (so Mathlib is not recompiled from source), runs `lake build` — which also
      # type-checks every `example`/`def` in the library, including the DSL round-trips and the
      # big-step smoke tests — and then runs `lake lint`.
      #
      # Lint enforcement has two layers, both gated here:
      #   * `build`: the `YulSemantics` library sets `warningAsError = true` in lakefile.toml, so
      #     `lake build` fails on any Lean warning (unused variables, deprecations, `sorry`, …).
      #   * `lint`: `lake lint` runs Batteries' environment linter (`runLinter`, wired via the
      #     `lintDriver` in lakefile.toml), which catches missing docstrings, unused arguments, and
      #     other issues a plain build does not.
      - name: Build & lint (fetch Mathlib cache, warnings = errors, runLinter)
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: "true"
          build: "true"
          test: "false"
          lint: "true"
