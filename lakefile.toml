name = "yul-semantics"
version = "0.1.0"
# Only the library is a default target: building the `yul-semantics` exe (a placeholder) would
# compile + link native object code for every transitively imported Mathlib module (~8500 `:c.o`
# clang jobs), which the Mathlib cache does not ship — that dominates CI time. Build the exe
# explicitly with `lake build yul-semantics` if needed.
defaultTargets = ["YulSemantics"]
# `lake lint` runs Batteries' environment linter (`runLinter`) over the default targets — it checks
# for missing docstrings, unused arguments, etc. that a plain `lake build` does not. CI runs this via
# lean-action's `lint: "true"`. Suppress individual false positives with `@[nolint <linter>]`.
lintDriver = "batteries/runLinter"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "YulSemantics"
# Treat every Lean warning (unused variables, deprecations, `sorry`, …) as a hard error so that a
# plain `lake build` — the same command CI runs — fails on lint regressions. Scoped to this library,
# so the Mathlib dependency (built with its own options) is unaffected.
leanOptions = { warningAsError = true }

[[lean_exe]]
name = "yul-semantics"
root = "Main"
